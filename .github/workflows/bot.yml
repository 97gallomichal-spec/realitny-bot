name: Realitný bot

# Robot beží automaticky každú hodinu + dá sa spustiť aj ručne tlačidlom.
on:
  schedule:
    - cron: "7 * * * *"      # každú hodinu o :07
  workflow_dispatch: {}        # tlačidlo "Run workflow" v záložke Actions

permissions:
  contents: write              # aby si bot mohol uložiť nájdené inzeráty

concurrency:
  group: realitny-bot
  cancel-in-progress: false

jobs:
  hladaj:
    runs-on: ubuntu-latest
    steps:
      - name: Stiahni projekt
        uses: actions/checkout@v4

      - name: Priprav Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Nainštaluj knižnice
        run: pip install -r requirements.txt

      - name: Spusti bota (hľadanie bytov)
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python scraper.py

      - name: Ulož nájdené inzeráty späť do projektu
        run: |
          git config user.name "realitny-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data docs
          if git diff --cached --quiet; then
            echo "Žiadne zmeny — nič na uloženie."
          else
            git commit -m "Aktualizácia inzerátov ($(date -u '+%Y-%m-%d %H:%M UTC'))"
            git push
          fi
